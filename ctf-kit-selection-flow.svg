<svg viewBox="0 0 980 430" xmlns="http://www.w3.org/2000/svg">
  <rect width="980" height="430" fill="#0d1117" />
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#58a6ff" />
    </marker>
  </defs>

  <text x="490" y="40" fill="#ffffff" font-family="monospace" font-size="22" text-anchor="middle" font-weight="bold">KIT SELECTION FLOW</text>
  <text x="490" y="60" fill="#8b949e" font-family="monospace" font-size="12" text-anchor="middle">KitSelectorUI + KitManager + Player lifecycle integration</text>

  <rect x="40" y="120" width="170" height="180" rx="6" fill="#161b22" stroke="#d29922" stroke-width="2"/>
  <text x="125" y="150" fill="#e3b341" font-family="monospace" font-size="13" text-anchor="middle" font-weight="bold">1. PLAYER JOIN</text>
  <text x="125" y="176" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">joinArenaPlayer(...)</text>
  <text x="125" y="194" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">team assignment</text>
  <text x="125" y="220" fill="#8b949e" font-family="monospace" font-size="10" text-anchor="middle">lobby or active match</text>

  <rect x="250" y="120" width="180" height="180" rx="6" fill="#1f6feb" fill-opacity="0.15" stroke="#58a6ff" stroke-width="2"/>
  <text x="340" y="150" fill="#58a6ff" font-family="monospace" font-size="13" text-anchor="middle" font-weight="bold">2. OPEN SELECTOR</text>
  <text x="340" y="176" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">KitSelectorUI inventory</text>
  <text x="340" y="194" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">player clicks kit item</text>
  <text x="340" y="220" fill="#8b949e" font-family="monospace" font-size="10" text-anchor="middle">selector listener event</text>

  <rect x="470" y="120" width="200" height="180" rx="6" fill="#238636" fill-opacity="0.15" stroke="#238636" stroke-width="2"/>
  <text x="570" y="150" fill="#2ea043" font-family="monospace" font-size="13" text-anchor="middle" font-weight="bold">3. APPLY KIT</text>
  <text x="570" y="176" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">KitManager set player kit</text>
  <text x="570" y="194" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">snapshot old inventory</text>
  <text x="570" y="212" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">load kit items/armor</text>
  <text x="570" y="238" fill="#8b949e" font-family="monospace" font-size="10" text-anchor="middle">running-state constraints</text>

  <rect x="710" y="120" width="230" height="180" rx="6" fill="#f78166" fill-opacity="0.15" stroke="#f78166" stroke-width="2"/>
  <text x="825" y="150" fill="#ff7b72" font-family="monospace" font-size="13" text-anchor="middle" font-weight="bold">4. COMBAT INTEGRATION</text>
  <text x="825" y="176" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">HomingSpearAbility checks kit</text>
  <text x="825" y="194" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">ScoutTaggerAbility checks kit</text>
  <text x="825" y="212" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">respawn reapplies selected kit</text>
  <text x="825" y="238" fill="#8b949e" font-family="monospace" font-size="10" text-anchor="middle">consistent loadout per role</text>

  <line x1="210" y1="210" x2="250" y2="210" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="430" y1="210" x2="470" y2="210" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="670" y1="210" x2="710" y2="210" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="250" y="330" width="690" height="60" rx="6" fill="#161b22" stroke="#8b949e" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="595" y="355" fill="#8b949e" font-family="monospace" font-size="11" text-anchor="middle" font-weight="bold">Fallback Path</text>
  <text x="595" y="374" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">On leave/stop, inventory snapshots restore and temporary ability state is cleared.</text>
</svg>
