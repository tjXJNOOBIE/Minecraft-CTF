<svg viewBox="0 0 980 520" xmlns="http://www.w3.org/2000/svg">
  <rect width="980" height="520" fill="#0d1117" />

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#58a6ff" />
    </marker>
  </defs>

  <text x="490" y="40" fill="#ffffff" font-family="monospace" font-size="22" text-anchor="middle" font-weight="bold">MATCH LIFECYCLE STATE FLOW</text>
  <text x="490" y="60" fill="#8b949e" font-family="monospace" font-size="12" text-anchor="middle">GameStateManager + GameLoopManager orchestration</text>

  <rect x="70" y="120" width="180" height="120" rx="6" fill="#d29922" fill-opacity="0.15" stroke="#d29922" stroke-width="2"/>
  <text x="160" y="155" fill="#e3b341" font-family="monospace" font-size="16" text-anchor="middle" font-weight="bold">LOBBY</text>
  <text x="160" y="182" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">Players join teams</text>
  <text x="160" y="200" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">Bases must be ready</text>

  <rect x="320" y="100" width="210" height="160" rx="6" fill="#1f6feb" fill-opacity="0.15" stroke="#58a6ff" stroke-width="2"/>
  <text x="425" y="135" fill="#58a6ff" font-family="monospace" font-size="15" text-anchor="middle" font-weight="bold">START COUNTDOWN</text>
  <text x="425" y="162" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">/ctf start -> 15s</text>
  <text x="425" y="180" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">/ctf start force -> 10s</text>
  <text x="425" y="198" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">aborts if invalid</text>
  <text x="425" y="216" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">(players/bases/state)</text>

  <rect x="600" y="120" width="190" height="120" rx="6" fill="#238636" fill-opacity="0.15" stroke="#238636" stroke-width="2"/>
  <text x="695" y="155" fill="#2ea043" font-family="monospace" font-size="16" text-anchor="middle" font-weight="bold">IN_PROGRESS</text>
  <text x="695" y="182" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">10m match timer</text>
  <text x="695" y="200" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">normal scoring mode</text>

  <rect x="600" y="300" width="190" height="120" rx="6" fill="#a371f7" fill-opacity="0.15" stroke="#a371f7" stroke-width="2"/>
  <text x="695" y="335" fill="#bc8cff" font-family="monospace" font-size="16" text-anchor="middle" font-weight="bold">OVERTIME</text>
  <text x="695" y="362" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">2m overtime timer</text>
  <text x="695" y="380" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">tiebreak finish</text>

  <rect x="320" y="300" width="210" height="120" rx="6" fill="#f78166" fill-opacity="0.15" stroke="#f78166" stroke-width="2"/>
  <text x="425" y="335" fill="#ff7b72" font-family="monospace" font-size="16" text-anchor="middle" font-weight="bold">CLEAN_UP</text>
  <text x="425" y="362" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">Winner celebration</text>
  <text x="425" y="380" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">state lock + reset tasks</text>

  <rect x="70" y="300" width="180" height="120" rx="6" fill="#161b22" stroke="#8b949e" stroke-width="2" stroke-dasharray="5,4"/>
  <text x="160" y="335" fill="#8b949e" font-family="monospace" font-size="14" text-anchor="middle" font-weight="bold">STOP EVENTS</text>
  <text x="160" y="362" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">manual /ctf stop</text>
  <text x="160" y="380" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">lone player / timeout</text>

  <line x1="250" y1="180" x2="320" y2="180" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="530" y1="180" x2="600" y2="180" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="695" y1="240" x2="695" y2="300" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="600" y1="360" x2="530" y2="360" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="320" y1="360" x2="250" y2="360" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="160" y1="300" x2="160" y2="240" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="286" y="166" fill="#8b949e" font-family="monospace" font-size="10" text-anchor="middle">start()</text>
  <text x="566" y="166" fill="#8b949e" font-family="monospace" font-size="10" text-anchor="middle">countdown end</text>
  <text x="713" y="272" fill="#8b949e" font-family="monospace" font-size="10">tie/timeout</text>
  <text x="565" y="346" fill="#8b949e" font-family="monospace" font-size="10" text-anchor="middle">stop(WIN)</text>
  <text x="286" y="346" fill="#8b949e" font-family="monospace" font-size="10" text-anchor="middle">finishStop()</text>

  <text x="490" y="480" fill="#8b949e" font-family="monospace" font-size="11" text-anchor="middle">All paths eventually converge to LOBBY reset with flags cleared, scoreboards refreshed, and join unlocked.</text>
</svg>
