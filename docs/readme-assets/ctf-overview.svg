  <text x="726" y="186" fill="#c9d1d9" font-family="monospace" font-size="11" text-anchor="middle">Overtime if tied</text>
  <rect x="690" y="204" width="72" height="22" rx="3" fill="#238636" fill-opacity="0.16" stroke="#238636" stroke-width="1"/>
  <text x="726" y="219" fill="#7ee787" font-family="monospace" font-size="10" text-anchor="middle">NEXT POINT</text>

  <text x="410" y="294" fill="#8b949e" font-family="monospace" font-size="11" text-anchor="middle">The match only scores when the carrier reaches base and their own flag has already been returned.</text>
