<svg viewBox="0 0 820 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="di-title di-desc">
  <title id="di-title">Minecraft CTF dependency injection flow</title>
  <desc id="di-desc">Bootstrap registries feed plugin boot, plugin boot queues services into DependencyLoader, and default access interfaces expose those live instances to domain handlers and commands.</desc>
  <rect width="820" height="420" fill="#0d1117"/>
  <defs>
    <marker id="diArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#58a6ff"/>
    </marker>
    <marker id="diGreenArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2ea043"/>
    </marker>
  </defs>

  <text x="410" y="34" fill="#ffffff" font-family="monospace" font-size="20" text-anchor="middle" font-weight="bold">DEPENDENCY INJECTION FLOW</text>
  <text x="410" y="56" fill="#8b949e" font-family="monospace" font-size="11" text-anchor="middle">Registries feed boot; loader exposes live services through access interfaces</text>

  <rect x="20" y="92" width="150" height="116" rx="4" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
  <text x="95" y="120" fill="#58a6ff" font-family="monospace" font-size="13" text-anchor="middle" font-weight="bold">REGISTRY</text>
  <text x="95" y="146" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">Game registry</text>
  <text x="95" y="164" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">Flag registry</text>
  <text x="95" y="182" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">Combat registry</text>

  <rect x="190" y="92" width="150" height="116" rx="4" fill="#161b22" stroke="#d29922" stroke-width="2"/>
  <text x="265" y="120" fill="#e3b341" font-family="monospace" font-size="13" text-anchor="middle" font-weight="bold">PLUGIN BOOT</text>
  <text x="265" y="146" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">reset instances</text>
  <text x="265" y="164" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">queue deps in order</text>
  <text x="265" y="182" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">load deps in order</text>

  <rect x="360" y="78" width="230" height="296" rx="4" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <text x="475" y="106" fill="#c9d1d9" font-family="monospace" font-size="14" text-anchor="middle" font-weight="bold">LOADER</text>

  <rect x="382" y="128" width="186" height="68" rx="4" fill="#1f6feb" fill-opacity="0.15" stroke="#58a6ff" stroke-width="1"/>
  <text x="475" y="148" fill="#79c0ff" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">queueDependency()</text>
  <text x="475" y="164" fill="#79c0ff" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">registerImportant()</text>
  <text x="475" y="180" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">queues suppliers + singletons</text>
  <text x="475" y="192" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">preserves bootstrap order</text>

  <rect x="382" y="210" width="186" height="48" rx="4" fill="#238636" fill-opacity="0.15" stroke="#238636" stroke-width="1"/>
  <text x="475" y="230" fill="#7ee787" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">loadQueuedDepsInOrder()</text>
  <text x="475" y="246" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">builds live service instances</text>

  <rect x="382" y="272" width="186" height="72" rx="4" fill="#f78166" fill-opacity="0.15" stroke="#f78166" stroke-width="1"/>
  <text x="475" y="292" fill="#ff7b72" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">requireInstance()</text>
  <text x="475" y="308" fill="#ff7b72" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">replaceInstance()</text>
  <text x="475" y="324" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">typed runtime/test lookups</text>
  <text x="475" y="336" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">fails if missing or still queued</text>

  <rect x="620" y="92" width="180" height="104" rx="4" fill="#161b22" stroke="#a371f7" stroke-width="2"/>
  <text x="710" y="120" fill="#d2a8ff" font-family="monospace" font-size="12" text-anchor="middle" font-weight="bold">DEFAULT ACCESS</text>
  <text x="710" y="146" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">PlayerDependencyAccess</text>
  <text x="710" y="164" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">Flag, Lifecycle, Team</text>
  <text x="710" y="182" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">small typed access mixins</text>

  <rect x="620" y="220" width="180" height="118" rx="4" fill="#161b22" stroke="#2ea043" stroke-width="2"/>
  <text x="710" y="246" fill="#7ee787" font-family="monospace" font-size="12" text-anchor="middle" font-weight="bold">DOMAIN CONSUMERS</text>
  <text x="710" y="272" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">Match flow handlers</text>
  <text x="710" y="290" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">Player death handlers</text>
  <text x="710" y="308" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">Flag handlers and commands</text>
  <text x="710" y="326" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">resolve services indirectly</text>

  <line x1="170" y1="150" x2="190" y2="150" stroke="#58a6ff" stroke-width="2" marker-end="url(#diArrow)"/>
  <line x1="340" y1="150" x2="360" y2="150" stroke="#58a6ff" stroke-width="2" marker-end="url(#diArrow)"/>
  <line x1="590" y1="144" x2="620" y2="144" stroke="#58a6ff" stroke-width="2" marker-end="url(#diArrow)"/>
  <line x1="710" y1="196" x2="710" y2="220" stroke="#2ea043" stroke-width="2" marker-end="url(#diGreenArrow)"/>

  <text x="410" y="392" fill="#8b949e" font-family="monospace" font-size="11" text-anchor="middle">Ordered registry input feeds boot, the loader creates live services, and access mixins keep use sites small.</text>
</svg>
