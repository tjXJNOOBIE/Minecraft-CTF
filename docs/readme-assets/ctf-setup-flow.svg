<svg viewBox="0 0 820 280" xmlns="http://www.w3.org/2000/svg">
  <rect width="820" height="280" fill="#0d1117"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#58a6ff"/>
    </marker>
  </defs>

  <text x="410" y="34" fill="#ffffff" font-family="monospace" font-size="20" text-anchor="middle" font-weight="bold">SETUP AND DEPLOY FLOW</text>
  <text x="410" y="56" fill="#8b949e" font-family="monospace" font-size="11" text-anchor="middle">Build locally, drop into Paper, configure the arena, then start a match</text>

  <rect x="28" y="90" width="136" height="116" rx="4" fill="#161b22" stroke="#d29922" stroke-width="2"/>
  <text x="96" y="118" fill="#e3b341" font-family="monospace" font-size="13" text-anchor="middle" font-weight="bold">CLONE</text>
  <text x="96" y="146" fill="#c9d1d9" font-family="monospace" font-size="11" text-anchor="middle">Git checkout</text>
  <text x="96" y="166" fill="#c9d1d9" font-family="monospace" font-size="11" text-anchor="middle">Java 25 ready</text>
  <text x="96" y="186" fill="#c9d1d9" font-family="monospace" font-size="11" text-anchor="middle">Gradle wrapper</text>

  <line x1="164" y1="148" x2="216" y2="148" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="216" y="90" width="160" height="116" rx="4" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
  <text x="296" y="118" fill="#58a6ff" font-family="monospace" font-size="13" text-anchor="middle" font-weight="bold">BUILD</text>
  <text x="296" y="146" fill="#c9d1d9" font-family="monospace" font-size="11" text-anchor="middle">./gradlew clean build</text>
  <text x="296" y="166" fill="#c9d1d9" font-family="monospace" font-size="11" text-anchor="middle">paper jar output</text>
  <rect x="246" y="178" width="100" height="16" rx="3" fill="#1f6feb" fill-opacity="0.2" stroke="#1f6feb" stroke-width="1"/>
  <text x="296" y="190" fill="#79c0ff" font-family="monospace" font-size="9" text-anchor="middle">build/out/</text>

  <line x1="376" y1="148" x2="428" y2="148" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="428" y="90" width="160" height="116" rx="4" fill="#161b22" stroke="#238636" stroke-width="2"/>
  <text x="508" y="118" fill="#2ea043" font-family="monospace" font-size="13" text-anchor="middle" font-weight="bold">PAPER SERVER</text>
  <text x="508" y="146" fill="#c9d1d9" font-family="monospace" font-size="11" text-anchor="middle">Drop jar into plugins</text>
  <text x="508" y="166" fill="#c9d1d9" font-family="monospace" font-size="11" text-anchor="middle">Boot once for configs</text>
  <text x="508" y="186" fill="#c9d1d9" font-family="monospace" font-size="11" text-anchor="middle">messages + flags + spawns</text>

  <line x1="588" y1="148" x2="640" y2="148" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="640" y="90" width="152" height="116" rx="4" fill="#161b22" stroke="#ff7b72" stroke-width="2"/>
  <text x="716" y="118" fill="#ff7b72" font-family="monospace" font-size="13" text-anchor="middle" font-weight="bold">IN-GAME SETUP</text>
  <text x="716" y="146" fill="#c9d1d9" font-family="monospace" font-size="11" text-anchor="middle">/ctf setflag</text>
  <text x="716" y="166" fill="#c9d1d9" font-family="monospace" font-size="11" text-anchor="middle">/ctf setspawn</text>
  <text x="716" y="186" fill="#c9d1d9" font-family="monospace" font-size="11" text-anchor="middle">/ctf setreturn / start</text>

  <text x="410" y="244" fill="#8b949e" font-family="monospace" font-size="11" text-anchor="middle">The plugin is intentionally light on external setup: build, drop in, set arena anchors, and run.</text>
</svg>
