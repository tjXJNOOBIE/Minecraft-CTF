<svg viewBox="0 0 820 452" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="loop-title loop-desc">
  <title id="loop-title">Minecraft CTF game loop flow</title>
  <desc id="loop-desc">MatchFlowHandler validates lobby state, starts the countdown through GameLoopTimer, transitions to an active match, updates scoreboards every tick, and hands off to overtime or cleanup when the timer ends.</desc>
  <rect width="820" height="452" fill="#0d1117"/>
  <defs>
    <marker id="loopArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#58a6ff"/>
    </marker>
  </defs>

  <text x="410" y="34" fill="#ffffff" font-family="monospace" font-size="20" text-anchor="middle" font-weight="bold">GAME LOOP FLOW</text>
  <text x="410" y="56" fill="#8b949e" font-family="monospace" font-size="11" text-anchor="middle">MatchFlowHandler + GameLoopTimer + MatchCleanupHandler</text>

  <rect x="30" y="112" width="160" height="96" rx="4" fill="#161b22" stroke="#d29922" stroke-width="2"/>
  <text x="110" y="140" fill="#e3b341" font-family="monospace" font-size="12" text-anchor="middle" font-weight="bold">MATCH REQUEST</text>
  <text x="110" y="164" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">requestMatchStart(force)</text>
  <text x="110" y="182" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">from lobby commands</text>
  <text x="110" y="196" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">or auto start</text>

  <rect x="230" y="90" width="178" height="132" rx="4" fill="#1f6feb" fill-opacity="0.15" stroke="#58a6ff" stroke-width="2"/>
  <text x="319" y="118" fill="#58a6ff" font-family="monospace" font-size="12" text-anchor="middle" font-weight="bold">COUNTDOWN VALIDATION</text>
  <text x="319" y="142" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">state == LOBBY</text>
  <text x="319" y="160" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">bases ready</text>
  <text x="319" y="178" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">enough players or force</text>
  <text x="319" y="196" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">startMatchCountdown()</text>

  <rect x="448" y="90" width="178" height="142" rx="4" fill="#238636" fill-opacity="0.15" stroke="#238636" stroke-width="2"/>
  <text x="537" y="118" fill="#2ea043" font-family="monospace" font-size="12" text-anchor="middle" font-weight="bold">START MATCH</text>
  <text x="537" y="142" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">set IN_PROGRESS</text>
  <text x="537" y="160" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">reset + update scoreboards</text>
  <text x="537" y="178" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">teleport players / apply kits</text>
  <text x="537" y="196" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">FlagLifecycleHandler</text>
  <text x="537" y="210" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">onMatchStart()</text>

  <rect x="666" y="112" width="124" height="88" rx="4" fill="#161b22" stroke="#f78166" stroke-width="2"/>
  <text x="728" y="140" fill="#ff7b72" font-family="monospace" font-size="12" text-anchor="middle" font-weight="bold">LIVE TIMER</text>
  <text x="728" y="164" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">startMatchTimer()</text>
  <text x="728" y="182" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">10m normal match</text>

  <rect x="230" y="264" width="178" height="110" rx="4" fill="#58a6ff" fill-opacity="0.15" stroke="#58a6ff" stroke-width="2"/>
  <text x="319" y="292" fill="#79c0ff" font-family="monospace" font-size="12" text-anchor="middle" font-weight="bold">PER-TICK WORK</text>
  <text x="319" y="314" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">updateScoreboards()</text>
  <text x="319" y="328" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">(remaining, state)</text>
  <text x="319" y="346" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">play end countdown sounds</text>
  <text x="319" y="360" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">broadcast timing feedback</text>

  <rect x="448" y="246" width="178" height="150" rx="4" fill="#a371f7" fill-opacity="0.15" stroke="#a371f7" stroke-width="2"/>
  <text x="537" y="274" fill="#d2a8ff" font-family="monospace" font-size="12" text-anchor="middle" font-weight="bold">TIMER END DECISION</text>
  <text x="537" y="298" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">tie -> OVERTIME (2m)</text>
  <text x="537" y="316" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">-> instant death</text>
  <text x="537" y="352" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">requestMatchStop()</text>
  <text x="537" y="366" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">(reason, winner)</text>

  <rect x="666" y="264" width="124" height="110" rx="4" fill="#161b22" stroke="#2ea043" stroke-width="2"/>
  <text x="728" y="292" fill="#7ee787" font-family="monospace" font-size="12" text-anchor="middle" font-weight="bold">CLEANUP</text>
  <text x="728" y="316" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">MatchCleanupHandler</text>
  <text x="728" y="334" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">reset flags and tasks</text>
  <text x="728" y="348" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">return to LOBBY</text>

  <line x1="190" y1="156" x2="230" y2="156" stroke="#58a6ff" stroke-width="2" marker-end="url(#loopArrow)"/>
  <line x1="408" y1="156" x2="448" y2="156" stroke="#58a6ff" stroke-width="2" marker-end="url(#loopArrow)"/>
  <line x1="626" y1="156" x2="666" y2="156" stroke="#58a6ff" stroke-width="2" marker-end="url(#loopArrow)"/>
  <line x1="728" y1="200" x2="728" y2="246" stroke="#58a6ff" stroke-width="2" marker-end="url(#loopArrow)"/>
  <line x1="666" y1="318" x2="626" y2="318" stroke="#58a6ff" stroke-width="2" marker-end="url(#loopArrow)"/>
  <line x1="448" y1="318" x2="408" y2="318" stroke="#58a6ff" stroke-width="2" marker-end="url(#loopArrow)"/>

  <text x="410" y="430" fill="#8b949e" font-family="monospace" font-size="11" text-anchor="middle">The loop is small but explicit: validate, count down, start the live match, tick UI/state, then branch to overtime or cleanup.</text>
</svg>
