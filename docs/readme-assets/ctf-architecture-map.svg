  <text x="109" y="160" fill="#c9d1d9" font-family="monospace" font-size="10" text-anchor="middle">shared runtime access</text>

  <rect x="34" y="206" width="150" height="84" rx="4" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
