  </defs>

  <text x="410" y="34" fill="#ffffff" font-family="monospace" font-size="20" text-anchor="middle" font-weight="bold">ARCHITECTURE MAP</text>
  <text x="410" y="56" fill="#8b949e" font-family="monospace" font-size="11" text-anchor="middle">Utility services, event routing, dependency access, and domain handlers</text>

  <rect x="34" y="90" width="150" height="84" rx="4" fill="#161b22" stroke="#d29922" stroke-width="2"/>
  <text x="109" y="118" fill="#e3b341" font-family="monospace" font-size="13" text-anchor="middle" font-weight="bold">UTILS</text>
